<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>오타몰 B2B - 공식 도매몰</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
  <style>
    :root {
      --primary: #2563eb;
      --primary-hover: #1d4ed8;
      --bg-main: #f8fafc;
      --card-bg: #ffffff;
      --text-main: #0f172a;
      --text-muted: #64748b;
      --border-color: #e2e8f0;
      --admin-bg: #fefce8;
      --admin-border: #fef08a;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; font-family: "Pretendard Variable", Pretendard, -apple-system, sans-serif; }
    body { background-color: var(--bg-main); color: var(--text-main); line-height: 1.5; padding-bottom: 60px; }
    .container { max-width: 1200px; margin: 0 auto; padding: 0 20px; }

    /* 헤더 & 네비게이션 */
    header { background: #1e293b; color: white; padding: 16px 0; margin-bottom: 24px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
    .nav-wrapper { display: flex; justify-content: space-between; align-items: center; }
    .logo { font-size: 1.4rem; font-weight: 800; color: #fff; }
    .user-badge { font-size: 0.85rem; background: rgba(255,255,255,0.1); padding: 6px 12px; border-radius: 20px; }
    
    /* 버튼 스타일 */
    .btn { cursor: pointer; padding: 8px 16px; border-radius: 6px; border: none; font-weight: 600; font-size: 0.9rem; transition: all 0.2s; display: inline-flex; align-items: center; justify-content: center; gap: 4px; }
    .btn-primary { background: var(--primary); color: white; }
    .btn-primary:hover { background: var(--primary-hover); }
    .btn-secondary { background: #64748b; color: white; }
    .btn-danger { background: #ef4444; color: white; }
    .btn-warning { background: #d97706; color: white; }
    .btn-cart { background: #059669; color: white; }
    .btn-cart:hover { background: #047857; }
    .btn-sm { padding: 4px 10px; font-size: 0.8rem; }

    /* 관리자 패널 */
    .admin-card { background: var(--admin-bg); border: 1px solid var(--admin-border); border-radius: 12px; padding: 20px; margin-bottom: 24px; }
    .admin-title { font-weight: 700; color: #854d0e; margin-bottom: 12px; display: flex; align-items: center; gap: 6px; }
    .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 12px; margin-bottom: 12px; }
    input, select { width: 100%; padding: 9px 12px; border: 1px solid var(--border-color); border-radius: 6px; background: #fff; font-size: 0.9rem; }

    /* 붙여넣기 드롭존 & 썸네일 미리보기 영역 */
    .paste-dropzone { border: 2px dashed #cbd5e1; background: #ffffff; padding: 16px; border-radius: 8px; text-align: center; margin-top: 6px; cursor: pointer; transition: background 0.2s; }
    .paste-dropzone:hover { background: #f1f5f9; }
    .preview-container { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 10px; }
    .preview-item { position: relative; width: 70px; height: 70px; border-radius: 6px; overflow: hidden; border: 1px solid var(--border-color); }
    .preview-item img { width: 100%; height: 100%; object-fit: cover; }
    .preview-remove-btn { position: absolute; top: 2px; right: 2px; background: rgba(239, 68, 68, 0.9); color: white; border: none; border-radius: 50%; width: 18px; height: 18px; font-size: 10px; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; }

    /* 관리자 테이블 */
    .admin-order-table { width: 100%; border-collapse: collapse; font-size: 0.85rem; margin-top: 10px; background: #fff; border-radius: 6px; overflow: hidden; }
    .admin-order-table th, .admin-order-table td { padding: 10px; border: 1px solid var(--border-color); text-align: left; }
    .admin-order-table th { background: #f1f5f9; font-weight: 700; }

    /* 2단계 계층형 카테고리 바 */
    .category-section { display: flex; flex-direction: column; gap: 10px; margin-bottom: 24px; border-bottom: 1px solid var(--border-color); padding-bottom: 16px; }
    .category-row { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 4px; }
    .cat-btn { padding: 8px 16px; border-radius: 20px; background: #fff; border: 1px solid var(--border-color); color: var(--text-muted); font-weight: 600; cursor: pointer; white-space: nowrap; transition: all 0.2s; }
    .cat-btn.active, .cat-btn:hover { background: var(--primary); color: white; border-color: var(--primary); }
    .sub-cat-row { background: #f1f5f9; padding: 10px 14px; border-radius: 12px; border: 1px solid var(--border-color); }
    .sub-cat-btn { padding: 6px 14px; border-radius: 16px; background: #fff; border: 1px solid var(--border-color); color: var(--text-muted); font-weight: 600; font-size: 0.85rem; cursor: pointer; white-space: nowrap; }
    .sub-cat-btn.active, .sub-cat-btn:hover { background: #059669; color: white; border-color: #059669; }

    /* 상품 카드 그리드 */
    .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 20px; }
    .product-card { background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 12px; overflow: hidden; display: flex; flex-direction: column; transition: transform 0.2s, box-shadow 0.2s; cursor: pointer; }
    .product-card:hover { transform: translateY(-4px); box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }
    
    .thumb-wrapper { position: relative; width: 100%; aspect-ratio: 1 / 1; background: #f1f5f9; overflow: hidden; }
    .thumb-img { width: 100%; height: 100%; object-fit: cover; }
    .no-img { display: flex; align-items: center; justify-content: center; height: 100%; color: var(--text-muted); font-size: 0.85rem; }
    
    .deadline-badge { position: absolute; top: 10px; left: 10px; background: rgba(15, 23, 42, 0.85); color: #fff; font-size: 0.75rem; font-weight: 700; padding: 4px 8px; border-radius: 4px; backdrop-filter: blur(4px); }
    .deadline-badge.expired { background: rgba(220, 38, 38, 0.9); }

    .card-body { padding: 14px; display: flex; flex-direction: column; flex-grow: 1; justify-content: space-between; gap: 8px; }
    .prod-title { font-size: 0.95rem; font-weight: 700; line-height: 1.3; color: var(--text-main); display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .prod-price { font-size: 1.1rem; font-weight: 800; color: var(--primary); }
    .price-masked { color: #ef4444; font-size: 0.85rem; font-weight: 700; }

    /* 페이지네이션 UI */
    .pagination { display: flex; justify-content: center; align-items: center; gap: 6px; margin-top: 36px; }
    .page-btn { padding: 6px 12px; border: 1px solid var(--border-color); background: #fff; border-radius: 6px; font-weight: 600; cursor: pointer; }
    .page-btn.active { background: var(--primary); color: white; border-color: var(--primary); }

    /* 모달 팝업 */
    .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: flex; justify-content: center; align-items: center; z-index: 1000; }
    .modal-content { background: #fff; padding: 24px; border-radius: 12px; width: 90%; max-width: 600px; max-height: 90vh; overflow-y: auto; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1); }
    .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
    
    .hidden { display: none !important; }
    .bank-notice { background: #eff6ff; border: 1px solid #bfdbfe; color: #1e3a8a; padding: 10px 12px; border-radius: 6px; font-size: 0.85rem; margin-top: 8px; font-weight: 600; }
    .price-breakdown { background: #f8fafc; padding: 12px; border-radius: 8px; border: 1px solid var(--border-color); margin: 12px 0; font-size: 0.85rem; }
    .price-row { display: flex; justify-content: space-between; margin-bottom: 4px; }
    .price-total { font-size: 1rem; font-weight: 800; color: var(--primary); border-top: 1px solid var(--border-color); padding-top: 6px; margin-top: 6px; }

    /* 장바구니 테이블 */
    .cart-table { width: 100%; border-collapse: collapse; margin-bottom: 16px; font-size: 0.85rem; }
    .cart-table th, .cart-table td { padding: 8px; border-bottom: 1px solid var(--border-color); text-align: left; vertical-align: middle; }
    .cart-table th { background: #f8fafc; color: var(--text-muted); }
  </style>
</head>
<body>

  <!-- 헤더 -->
  <header>
    <div class="container nav-wrapper">
      <div class="logo">🏬 오타몰 B2B</div>
      <div style="display: flex; gap: 10px; align-items: center;">
        <span id="user-status" class="user-badge">확인 중...</span>
        <button id="btn-cart-toggle" class="btn btn-cart btn-sm" onclick="openCartModal()">🛒 장바구니 (<span id="cart-count">0</span>)</button>
        <button id="btn-login-modal" class="btn btn-primary btn-sm" onclick="showModal('login-modal')">로그인</button>
        <button id="btn-signup-modal" class="btn btn-secondary btn-sm" onclick="showModal('signup-modal')">사업자 회원가입</button>
        <button id="btn-logout" class="btn btn-danger btn-sm hidden" onclick="handleLogout()">로그아웃</button>
      </div>
    </div>
  </header>

  <div class="container">

    <!-- [관리자 전용 1] 카테고리 관리 -->
    <div id="admin-category-panel" class="admin-card hidden">
      <div class="admin-title">🛠️ [관리자] 카테고리 생성 및 삭제 관리</div>
      <div id="category-tree" style="margin-bottom: 12px;"></div>
      <div style="display:flex; gap:8px; margin-bottom:8px;">
        <input type="text" id="new-main-cat" placeholder="신규 대분류명">
        <button class="btn btn-primary btn-sm" onclick="addMainCategory()">대분류 추가</button>
      </div>
      <div style="display:flex; gap:8px;">
        <select id="select-parent-cat"></select>
        <input type="text" id="new-sub-cat" placeholder="신규 소분류명">
        <button class="btn btn-primary btn-sm" style="background:#059669;" onclick="addSubCategory()">소분류 추가</button>
      </div>
    </div>

    <!-- [관리자 전용 2] 상품 등록 (파일 업로드 + 스크린샷 붙여넣기 지원) -->
    <div id="admin-product-panel" class="admin-card hidden">
      <div class="admin-title">🛍️ [관리자] 신규 상품 등록</div>
      <div class="form-grid">
        <input type="text" id="p-name" placeholder="상품명">
        <select id="p-category"></select>
        <input type="date" id="p-deadline">
        <input type="number" id="p-price" placeholder="개당 도매가(원)">
        <input type="number" id="p-moq" value="5" placeholder="최소주문수량(MOQ)">
        <input type="text" id="p-delivery" placeholder="예상 배송 시기 (예: 2026년 4분기)">
        
        <!-- 파일 선택 및 Ctrl+V 붙여넣기 통합 구역 -->
        <div style="grid-column: 1 / -1;">
          <label style="font-size:0.8rem; font-weight:700;">📸 상품 이미지 (파일 선택 또는 화면 캡처 후 Ctrl+V 붙여넣기 가능)</label>
          <div class="paste-dropzone" onclick="document.getElementById('p-images').click();">
            <p style="font-size:0.85rem; color:var(--text-muted); pointer-events:none;">
              📁 클릭하여 파일 선택 | 📋 스크린샷 캡처 후 이 창에 <strong>Ctrl + V</strong> 누르기
            </p>
            <input type="file" id="p-images" multiple accept="image/*" style="display:none;" onchange="handleFileSelect(event)">
          </div>
          <!-- 선택/붙여넣은 이미지 미리보기 및 삭제 목록 -->
          <div id="image-preview-container" class="preview-container"></div>
        </div>
      </div>
      <button id="btn-add-prod" class="btn btn-primary" style="width:100%;" onclick="addProduct()">상품 등록하기</button>
    </div>

    <!-- [관리자 전용 3] 상품별 발주 현황 조회 -->
    <div id="admin-orders-panel" class="admin-card hidden">
      <div class="admin-title">📋 [관리자] 상품별 최근 발주 및 구매자 현황</div>
      <div id="admin-orders-list">주문 데이터를 불러오는 중...</div>
    </div>

    <!-- 2단계 계층형 카테고리 필터 섹션 -->
    <div class="category-section">
      <div id="main-category-bar" class="category-row"></div>
      <div id="sub-category-bar" class="category-row sub-cat-row hidden"></div>
    </div>

    <!-- 상품 카드 리스트 그리드 -->
    <div id="product-list" class="product-grid"></div>

    <!-- 페이지네이션 UI -->
    <div id="pagination" class="pagination"></div>

  </div>

  <!-- 모달 1: 로그인 -->
  <div id="login-modal" class="modal-overlay hidden">
    <div class="modal-content" style="max-width:400px;">
      <div class="modal-header"><h3>🔐 도매 회원 로그인</h3><button onclick="hideModal('login-modal')">✕</button></div>
      <input type="text" id="login-email" placeholder="이메일 주소" style="margin-bottom:10px;">
      <input type="password" id="login-pw" placeholder="비밀번호" style="margin-bottom:16px;">
      <button class="btn btn-primary" style="width:100%;" onclick="handleLogin()">로그인</button>
    </div>
  </div>

  <!-- 모달 2: 회원가입 -->
  <div id="signup-modal" class="modal-overlay hidden">
    <div class="modal-content" style="max-width:450px;">
      <div class="modal-header"><h3>📝 사업자 회원가입 (필수)</h3><button onclick="hideModal('signup-modal')">✕</button></div>
      <div style="display:flex; flex-direction:column; gap:10px; margin-bottom:16px;">
        <div><label style="font-size:0.8rem; font-weight:700;">이메일 주소 *</label><input type="text" id="signup-email" placeholder="email@example.com"></div>
        <div><label style="font-size:0.8rem; font-weight:700;">비밀번호 *</label><input type="password" id="signup-pw" placeholder="6자리 이상 입력"></div>
        <div><label style="font-size:0.8rem; font-weight:700;">사업자 상호명 *</label><input type="text" id="signup-bizname" placeholder="예: 오타굿즈샵"></div>
        <div><label style="font-size:0.8rem; font-weight:700;">예금주명 *</label><input type="text" id="signup-depositor" placeholder="입금자 성함/법인명"></div>
        <div><label style="font-size:0.8rem; font-weight:700;">전화번호 *</label><input type="text" id="signup-phone" placeholder="010-0000-0000"></div>
        <div><label style="font-size:0.8rem; font-weight:700;">배송지 주소 *</label><input type="text" id="signup-address" placeholder="상세주소 포함 전체 주소"></div>
      </div>
      <button class="btn btn-primary" style="width:100%;" onclick="handleSignup()">가입 신청하기</button>
    </div>
  </div>

  <!-- 모달 3: 상품 상세 모달 -->
  <div id="detail-modal" class="modal-overlay hidden">
    <div class="modal-content">
      <div class="modal-header"><h3 id="modal-prod-title">상품 상세 정보</h3><button onclick="hideModal('detail-modal')">✕</button></div>
      <div id="modal-prod-body"></div>
    </div>
  </div>

  <!-- 모달 4: 관리자 상품 정보 수정 모달 -->
  <div id="edit-prod-modal" class="modal-overlay hidden">
    <div class="modal-content">
      <div class="modal-header"><h3>✏️ 상품 정보 수정</h3><button onclick="hideModal('edit-prod-modal')">✕</button></div>
      <input type="hidden" id="edit-p-id">
      <div class="form-grid" style="grid-template-columns: 1fr;">
        <div><label style="font-size:0.8rem; font-weight:700;">상품명</label><input type="text" id="edit-p-name"></div>
        <div><label style="font-size:0.8rem; font-weight:700;">카테고리</label><select id="edit-p-category"></select></div>
        <div><label style="font-size:0.8rem; font-weight:700;">주문 마감일</label><input type="date" id="edit-p-deadline"></div>
        <div><label style="font-size:0.8rem; font-weight:700;">도매가(원)</label><input type="number" id="edit-p-price"></div>
        <div><label style="font-size:0.8rem; font-weight:700;">최소주문수량(MOQ)</label><input type="number" id="edit-p-moq"></div>
        <div><label style="font-size:0.8rem; font-weight:700;">예상 배송 시기</label><input type="text" id="edit-p-delivery"></div>
      </div>
      <button class="btn btn-primary" style="width:100%; margin-top:12px;" onclick="saveProductEdit()">수정 사항 저장</button>
    </div>
  </div>

  <!-- 모달 5: 🛒 장바구니 일괄 발주 모달 -->
  <div id="cart-modal" class="modal-overlay hidden">
    <div class="modal-content" style="max-width:700px;">
      <div class="modal-header"><h3>🛒 장바구니 일괄 발주</h3><button onclick="hideModal('cart-modal')">✕</button></div>
      <div id="cart-modal-body"></div>
    </div>
  </div>

  <script>
    const SUPABASE_URL = "https://jjgyzlcegsckiobjwybb.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_4KNUSIVCUUveVbtaCQ-uhg_R2RvBZmF"; 
    const BANK_ACCOUNT_INFO = "국민은행 104301-04-481564";

    const supabaseClient = window.supabase ? window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY) : null;

    let currentUser = null;
    let userProfile = null;
    let categoriesData = [];
    let rawProductsData = [];
    let filteredProductsData = [];
    
    let selectedMainCatId = null;
    let selectedSubCatId = null;

    let currentPage = 1;
    const itemsPerPage = 25;

    let cartItems = JSON.parse(localStorage.getItem('otamall_cart') || '[]');

    // 업로드 대상 파일들을 저장하는 통합 관리 배열 (파일선택 + Ctrl+V 붙여넣기 공용)
    let uploadFilesList = [];

    window.addEventListener('DOMContentLoaded', async () => {
      if (!supabaseClient) return;
      updateCartBadge();
      await checkUserSession();
      await fetchCategories();
      await fetchProducts();

      // 글로벌 Paste(붙여넣기) 이벤트 리스너 등록
      document.addEventListener('paste', handlePasteEvent);
    });

    // --- 📸 파일 선택 및 스크린샷 붙여넣기(Paste) 처리 ---
    function handleFileSelect(event) {
      const files = Array.from(event.target.files);
      files.forEach(f => uploadFilesList.push(f));
      renderImagePreviews();
      event.target.value = ''; // 동일 파일 재선택 가능하도록 초기화
    }

    function handlePasteEvent(e) {
      const adminPanel = document.getElementById('admin-product-panel');
      // 관리자 패널이 닫혀있는 경우에는 붙여넣기 작동 방지
      if (!adminPanel || adminPanel.classList.contains('hidden')) return;

      const items = e.clipboardData?.items;
      if (!items) return;

      let added = false;
      for (let i = 0; i < items.length; i++) {
        if (items[i].type.indexOf('image') !== -1) {
          const blob = items[i].getAsFile();
          if (blob) {
            // 복사된 Blob 객체를 File 객체로 변환
            const fileName = `screenshot_${Date.now()}_${i}.png`;
            const file = new File([blob], fileName, { type: blob.type });
            uploadFilesList.push(file);
            added = true;
          }
        }
      }

      if (added) {
        e.preventDefault();
        renderImagePreviews();
      }
    }

    function renderImagePreviews() {
      const container = document.getElementById('image-preview-container');
      container.innerHTML = '';

      uploadFilesList.forEach((file, index) => {
        const objectUrl = URL.createObjectURL(file);
        container.innerHTML += `
          <div class="preview-item">
            <img src="${objectUrl}" alt="미리보기">
            <button class="preview-remove-btn" onclick="removeImageFromUploadList(${index})" title="삭제">✕</button>
          </div>
        `;
      });
    }

    function removeImageFromUploadList(index) {
      uploadFilesList.splice(index, 1);
      renderImagePreviews();
    }

    async function checkUserSession() {
      const { data: { session } } = await supabaseClient.auth.getSession();
      if (session) {
        currentUser = session.user;
        const { data: profile } = await supabaseClient.from('profiles').select('*').eq('id', currentUser.id).maybeSingle();
        userProfile = profile;
      } else {
        currentUser = null;
        userProfile = null;
      }
      updateUI();
    }

    async function handleLogin() {
      const email = document.getElementById('login-email').value;
      const password = document.getElementById('login-pw').value;
      const { error } = await supabaseClient.auth.signInWithPassword({ email, password });
      if (error) return alert("로그인 실패: " + error.message);
      hideModal('login-modal');
      await checkUserSession();
      await fetchProducts();
    }

    async function handleSignup() {
      const email = document.getElementById('signup-email').value.trim();
      const password = document.getElementById('signup-pw').value.trim();
      const bizName = document.getElementById('signup-bizname').value.trim();
      const depositorName = document.getElementById('signup-depositor').value.trim();
      const phone = document.getElementById('signup-phone').value.trim();
      const address = document.getElementById('signup-address').value.trim();

      if (!email || !password || !bizName || !depositorName || !phone || !address) {
        return alert("모든 항목을 필수 입력해 주세요.");
      }

      const { data, error } = await supabaseClient.auth.signUp({ email, password });
      if (error) return alert("가입 에러: " + error.message);

      if (data?.user) {
        const { error: profileErr } = await supabaseClient.from('profiles').upsert([{
          id: data.user.id,
          email: email,
          biz_name: bizName,
          depositor_name: depositorName,
          phone: phone,
          address: address,
          role: 'user'
        }]);

        if (profileErr) alert("프로필 저장 에러: " + profileErr.message);
        else {
          alert("회원가입 신청이 성공적으로 완료되었습니다.");
          hideModal('signup-modal');
          await checkUserSession();
        }
      }
    }

    async function handleLogout() {
      await supabaseClient.auth.signOut();
      await checkUserSession();
      await fetchProducts();
    }

    // --- 카테고리 관리 ---
    async function fetchCategories() {
      const { data } = await supabaseClient.from('categories').select('*');
      categoriesData = data || [];

      const mainCats = categoriesData.filter(c => c.parent_id === null);
      
      const mainBar = document.getElementById('main-category-bar');
      const subBar = document.getElementById('sub-category-bar');
      const parentSelect = document.getElementById('select-parent-cat');
      const productCatSelect = document.getElementById('p-category');
      const editCatSelect = document.getElementById('edit-p-category');

      mainBar.innerHTML = `<button class="cat-btn ${selectedMainCatId === null ? 'active' : ''}" onclick="selectMainCategory(null)">전체보기</button>`;
      mainCats.forEach(main => {
        mainBar.innerHTML += `<button class="cat-btn ${selectedMainCatId === main.id ? 'active' : ''}" onclick="selectMainCategory(${main.id})">${main.name}</button>`;
      });

      if (selectedMainCatId !== null) {
        const subCats = categoriesData.filter(c => c.parent_id === selectedMainCatId);
        subBar.classList.remove('hidden');
        subBar.innerHTML = `<button class="sub-cat-btn ${selectedSubCatId === null ? 'active' : ''}" onclick="selectSubCategory(null)">└ 전체</button>`;
        subCats.forEach(sub => {
          subBar.innerHTML += `<button class="sub-cat-btn ${selectedSubCatId === sub.id ? 'active' : ''}" onclick="selectSubCategory(${sub.id})">${sub.name}</button>`;
        });
      } else {
        subBar.classList.add('hidden');
      }

      parentSelect.innerHTML = "<option value=''>-- 대분류 선택 --</option>";
      productCatSelect.innerHTML = "<option value=''>-- 소분류 선택 --</option>";
      editCatSelect.innerHTML = "<option value=''>-- 소분류 선택 --</option>";

      mainCats.forEach(main => {
        parentSelect.innerHTML += `<option value="${main.id}">${main.name}</option>`;
        const subs = categoriesData.filter(c => c.parent_id === main.id);
        subs.forEach(s => {
          productCatSelect.innerHTML += `<option value="${s.id}">${main.name} > ${s.name}</option>`;
          editCatSelect.innerHTML += `<option value="${s.id}">${main.name} > ${s.name}</option>`;
        });
      });

      if (userProfile && userProfile.role === 'admin') {
        const tree = document.getElementById('category-tree');
        tree.innerHTML = "";
        mainCats.forEach(m => {
          const subs = categoriesData.filter(c => c.parent_id === m.id);
          let subHtml = subs.map(s => `${s.name} <button class="btn btn-danger btn-sm" style="padding:1px 5px; font-size:0.7rem;" onclick="deleteCategory(${s.id})">삭제</button>`).join(' | ');
          tree.innerHTML += `
            <div style="margin-bottom:8px; padding:8px; background:#fff; border-radius:6px; border:1px solid #fef08a;">
              <strong>📂 ${m.name}</strong> 
              <button class="btn btn-danger btn-sm" style="padding:2px 6px; font-size:0.75rem;" onclick="deleteCategory(${m.id})">대분류 삭제</button>
              <div style="margin-left: 15px; font-size:0.85rem; color:#475569; margin-top:4px;">└ 소분류: ${subHtml || '없음'}</div>
            </div>`;
        });
      }
    }

    function selectMainCategory(mainId) {
      selectedMainCatId = mainId;
      selectedSubCatId = null;
      currentPage = 1;
      fetchCategories();
      applyFilterAndRender();
    }

    function selectSubCategory(subId) {
      selectedSubCatId = subId;
      currentPage = 1;
      fetchCategories();
      applyFilterAndRender();
    }

    async function deleteCategory(id) {
      if (!confirm("해당 카테고리를 삭제하시겠습니까?")) return;
      await supabaseClient.from('categories').delete().eq('id', id);
      await fetchCategories();
      await fetchProducts();
    }

    // --- 상품 데이터 조회 및 렌더링 ---
    async function fetchProducts() {
      const { data } = await supabaseClient.from('products').select('*').order('created_at', { ascending: false });
      rawProductsData = data || [];
      applyFilterAndRender();
      if (userProfile && userProfile.role === 'admin') {
        fetchAdminOrders();
      }
    }

    function applyFilterAndRender() {
      if (selectedMainCatId === null) {
        filteredProductsData = [...rawProductsData];
      } else if (selectedSubCatId !== null) {
        filteredProductsData = rawProductsData.filter(p => p.category_id === selectedSubCatId);
      } else {
        const subCatIds = categoriesData.filter(c => c.parent_id === selectedMainCatId).map(c => c.id);
        filteredProductsData = rawProductsData.filter(p => p.category_id === selectedMainCatId || subCatIds.includes(p.category_id));
      }

      renderProductGrid();
      renderPagination();
    }

    function renderProductGrid() {
      const container = document.getElementById('product-list');
      container.innerHTML = "";

      if (filteredProductsData.length === 0) {
        container.innerHTML = "<p style='grid-column: 1/-1; text-align:center; padding:40px; color:#64748b;'>해당 카테고리의 상품이 없습니다.</p>";
        return;
      }

      const startIndex = (currentPage - 1) * itemsPerPage;
      const paginatedItems = filteredProductsData.slice(startIndex, startIndex + itemsPerPage);

      const isLogged = currentUser !== null;
      const isAdmin = userProfile && userProfile.role === 'admin';
      const today = new Date().toISOString().split('T')[0];

      paginatedItems.forEach(p => {
        const isExpired = p.deadline && today > p.deadline;
        const mainImg = (Array.isArray(p.images) && p.images.length > 0) ? p.images[0] : null;
        
        const priceDisplay = isLogged 
          ? `${p.wholesale_price.toLocaleString()}원` 
          : `<span class="price-masked">🔒 로그인 후 확인</span>`;

        container.innerHTML += `
          <div class="product-card" onclick="openDetailModal(${p.id})">
            <div class="thumb-wrapper">
              ${mainImg ? `<img src="${mainImg}" class="thumb-img" alt="${p.name}">` : `<div class="no-img">이미지 없음</div>`}
              <span class="deadline-badge ${isExpired ? 'expired' : ''}">
                ⏱️ ${p.deadline ? p.deadline + ' 마감' : '상시접수'}
              </span>
            </div>
            <div class="card-body">
              <div class="prod-title">${p.name}</div>
              <div class="prod-price">${priceDisplay}</div>
              ${isLogged && !isAdmin ? `
                <button class="btn btn-cart btn-sm" style="width:100%; margin-top:4px;" 
                        onclick="event.stopPropagation(); addToCart(${p.id})">
                  🛒 장바구니 담기
                </button>
              ` : ''}
            </div>
          </div>
        `;
      });
    }

    function renderPagination() {
      const container = document.getElementById('pagination');
      container.innerHTML = "";
      const totalPages = Math.ceil(filteredProductsData.length / itemsPerPage);
      if (totalPages <= 1) return;

      for (let i = 1; i <= totalPages; i++) {
        container.innerHTML += `<button class="page-btn ${i === currentPage ? 'active' : ''}" onclick="goToPage(${i})">${i}</button>`;
      }
    }

    function goToPage(page) {
      currentPage = page;
      renderProductGrid();
      renderPagination();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    // --- 장바구니 로직 ---
    function updateCartBadge() {
      const totalQty = cartItems.reduce((sum, item) => sum + item.qty, 0);
      document.getElementById('cart-count').innerText = totalQty;
      localStorage.setItem('otamall_cart', JSON.stringify(cartItems));
    }

    function addToCart(productId, customQty = null) {
      if (!currentUser) return alert("장바구니 기능은 로그인 후 이용 가능합니다.");
      const p = rawProductsData.find(item => item.id === productId);
      if (!p) return;

      const qtyToAdd = customQty !== null ? customQty : p.moq;
      const existing = cartItems.find(item => item.product_id === productId);

      if (existing) {
        existing.qty += qtyToAdd;
      } else {
        cartItems.push({
          product_id: p.id,
          name: p.name,
          wholesale_price: p.wholesale_price,
          moq: p.moq,
          qty: qtyToAdd,
          image: (Array.isArray(p.images) && p.images.length > 0) ? p.images[0] : null
        });
      }

      updateCartBadge();
      alert(`[${p.name}] 상품이 장바구니에 담겼습니다.`);
    }

    function removeFromCart(productId) {
      cartItems = cartItems.filter(item => item.product_id !== productId);
      updateCartBadge();
      renderCartModal();
    }

    function updateCartQty(productId, newQty) {
      const item = cartItems.find(i => i.product_id === productId);
      if (item) {
        item.qty = Math.max(item.moq, parseInt(newQty) || item.moq);
        updateCartBadge();
        renderCartModal();
      }
    }

    function openCartModal() {
      if (!currentUser) return alert("로그인 후 장바구니를 확인하실 수 있습니다.");
      renderCartModal();
      showModal('cart-modal');
    }

    function renderCartModal() {
      const container = document.getElementById('cart-modal-body');
      if (cartItems.length === 0) {
        container.innerHTML = "<p style='text-align:center; padding:40px; color:#64748b;'>장바구니가 비어 있습니다.</p>";
        return;
      }

      let subtotal = 0;
      let tableRows = cartItems.map(item => {
        const itemSum = item.wholesale_price * item.qty;
        subtotal += itemSum;
        return `
          <tr>
            <td>
              <div style="display:flex; align-items:center; gap:8px;">
                ${item.image ? `<img src="${item.image}" style="width:40px; height:40px; object-fit:cover; border-radius:4px;">` : ''}
                <span style="font-weight:700;">${item.name}</span>
              </div>
            </td>
            <td>${item.wholesale_price.toLocaleString()}원</td>
            <td>
              <input type="number" value="${item.qty}" min="${item.moq}" 
                     style="width:70px; padding:4px;" 
                     onchange="updateCartQty(${item.product_id}, this.value)">
            </td>
            <td style="font-weight:700;">${itemSum.toLocaleString()}원</td>
            <td><button class="btn btn-danger btn-sm" onclick="removeFromCart(${item.product_id})">삭제</button></td>
          </tr>
        `;
      }).join('');

      const isTax = document.getElementById('cart-tax-check')?.checked || false;
      const vat = isTax ? Math.round(subtotal * 0.1) : 0;
      const shipping = subtotal >= 200000 ? 0 : 4000;
      const grandTotal = subtotal + vat + shipping;

      container.innerHTML = `
        <table class="cart-table">
          <thead>
            <tr><th>상품명</th><th>단가</th><th>수량</th><th>합계</th><th>관리</th></tr>
          </thead>
          <tbody>${tableRows}</tbody>
        </table>

        <label style="font-size:0.85rem; font-weight:700;">
          <input type="checkbox" id="cart-tax-check" ${isTax ? 'checked' : ''} onchange="renderCartModal()"> 
          세금계산서 발행 신청 (+VAT 10%)
        </label>

        <div class="price-breakdown">
          <div class="price-row"><span>총 상품금액:</span><span>${subtotal.toLocaleString()} 원</span></div>
          <div class="price-row"><span>부가세 (VAT 10%):</span><span>${vat.toLocaleString()} 원</span></div>
          <div class="price-row">
            <span>배송비 (20만원 이상 구매 시 무료):</span>
            <span>${shipping === 0 ? "0원 (무료배송)" : "4,000원"}</span>
          </div>
          <div class="price-row price-total"><span>최종 결제 금액:</span><span>${grandTotal.toLocaleString()} 원</span></div>
          <div class="bank-notice">🏦 입금 계좌 안내: ${BANK_ACCOUNT_INFO}</div>
        </div>

        <button class="btn btn-primary" style="width:100%; padding:12px;" onclick="submitCartCheckout()">
          🛒 장바구니 상품 한 번에 발주서 제출하기 (무통장입금)
        </button>
      `;
    }

    async function submitCartCheckout() {
      if (cartItems.length === 0) return;

      const isTax = document.getElementById('cart-tax-check').checked;

      const orderPayloads = cartItems.map(item => {
        const itemSum = item.wholesale_price * item.qty;
        const itemVat = isTax ? Math.round(itemSum * 0.1) : 0;
        return {
          user_id: currentUser.id,
          product_id: item.product_id,
          product_name: item.name,
          qty: item.qty,
          is_tax_invoice: isTax,
          total_price: itemSum + itemVat,
          status: 'pending'
        };
      });

      const { error } = await supabaseClient.from('orders').insert(orderPayloads);

      if (error) {
        alert("일괄 발주 제출 실패: " + error.message);
      } else {
        alert(`장바구니 주문이 완료되었습니다. ${BANK_ACCOUNT_INFO}로 입금 부탁드립니다.`);
        cartItems = [];
        updateCartBadge();
        hideModal('cart-modal');
        if (userProfile && userProfile.role === 'admin') fetchAdminOrders();
      }
    }

    // --- 상품 상세 모달 ---
    function openDetailModal(productId) {
      const p = rawProductsData.find(item => item.id === productId);
      if (!p) return;

      const isLogged = currentUser !== null;
      const isAdmin = userProfile && userProfile.role === 'admin';
      const today = new Date().toISOString().split('T')[0];
      const isExpired = p.deadline && today > p.deadline;
      const imgList = Array.isArray(p.images) ? p.images : [];

      document.getElementById('modal-prod-title').innerText = p.name;
      
      let bodyHtml = `
        <div style="margin-bottom:16px;">
          ${imgList.length > 0 ? `<img id="modal-main-img" src="${imgList[0]}" style="width:100%; max-height:300px; object-fit:contain; background:#f1f5f9; border-radius:8px; margin-bottom:8px;">` : ''}
          <div style="display:flex; gap:6px; overflow-x:auto;">
            ${imgList.map(url => `<img src="${url}" style="width:50px; height:50px; object-fit:cover; border-radius:4px; cursor:pointer;" onclick="document.getElementById('modal-main-img').src='${url}'">`).join('')}
          </div>
        </div>

        <p style="font-size:0.9rem; color:#64748b; margin-bottom:8px;">
          ⏱️ 마감일: <strong>${p.deadline || '상시'}</strong> | 🚚 예상 배송: ${p.delivery_date || '미정'}
        </p>
      `;

      if (isAdmin) {
        bodyHtml += `
          <div style="margin-top:16px; padding-top:16px; border-top:1px solid var(--border-color);">
            <p style="font-size:1rem; font-weight:800; color:var(--primary); margin-bottom:12px;">
              개당 도매가: ${p.wholesale_price.toLocaleString()}원 | MOQ: ${p.moq}개
            </p>
            <div style="display:flex; gap:8px;">
              <button class="btn btn-warning" style="flex:1;" onclick="openEditModal(${p.id})">✏️ 상품 정보 수정</button>
              <button class="btn btn-danger" style="flex:1;" onclick="deleteProduct(${p.id})">🗑️ 상품 삭제</button>
            </div>
          </div>
        `;
      } else if (isLogged) {
        bodyHtml += `
          <div style="margin-top:12px; border-top:1px solid var(--border-color); padding-top:12px;">
            <p style="font-size:1.1rem; font-weight:800; color:var(--primary); margin-bottom:12px;">
              개당 도매가: ${p.wholesale_price.toLocaleString()}원 (MOQ: ${p.moq}개)
            </p>
            
            <label style="font-weight:700; font-size:0.85rem;">주문 수량: 
              <input type="number" id="modal-qty" value="${p.moq}" min="${p.moq}" onchange="calcTotalModal(${p.wholesale_price})" style="width:90px; margin-left:8px;">
            </label><br><br>

            <label style="font-size:0.85rem;">
              <input type="checkbox" id="modal-tax" onchange="calcTotalModal(${p.wholesale_price})"> 세금계산서 발행 신청 (+VAT 10%)
            </label>

            <div class="price-breakdown">
              <div class="price-row"><span>상품 금액합계:</span><span id="m-subtotal">0 원</span></div>
              <div class="price-row"><span>부가세 (VAT 10%):</span><span id="m-vat">0 원</span></div>
              <div class="price-row"><span>배송비 (20만원 이상 구매 시 무료):</span><span id="m-shipping">0 원</span></div>
              <div class="price-row price-total"><span>최종 결제 금액:</span><span id="m-total">0 원</span></div>
              <div class="bank-notice">🏦 입금 계좌 안내: ${BANK_ACCOUNT_INFO}</div>
            </div>

            <div style="display:flex; gap:8px;">
              <button class="btn btn-cart" style="flex:1; padding:12px;" onclick="addSingleToCartFromModal(${p.id})">
                🛒 장바구니 담기
              </button>
              <button class="btn btn-primary" style="flex:1; padding:12px;" onclick="submitOrder('${p.name}', ${p.id})" ${isExpired ? 'disabled' : ''}>
                ${isExpired ? '주문 마감됨' : '바로 발주하기'}
              </button>
            </div>
          </div>
        `;
      } else {
        bodyHtml += `<p class="price-masked" style="margin-top:12px;">🔒 도매 가격 확인 및 주문은 사업자 로그인 후 가능합니다.</p>`;
      }

      document.getElementById('modal-prod-body').innerHTML = bodyHtml;
      showModal('detail-modal');
      if (isLogged && !isAdmin) calcTotalModal(p.wholesale_price);
    }

    function addSingleToCartFromModal(productId) {
      const qty = parseInt(document.getElementById('modal-qty').value);
      addToCart(productId, qty);
      hideModal('detail-modal');
    }

    function calcTotalModal(unitPrice) {
      const qty = parseInt(document.getElementById('modal-qty').value) || 0;
      const isTax = document.getElementById('modal-tax').checked;

      const productTotal = unitPrice * qty;
      const vat = isTax ? Math.round(productTotal * 0.1) : 0;
      const shipping = (productTotal >= 200000) ? 0 : 4000;
      const finalTotal = productTotal + vat + shipping;

      document.getElementById('m-subtotal').innerText = `${productTotal.toLocaleString()} 원`;
      document.getElementById('m-vat').innerText = `${vat.toLocaleString()} 원`;
      document.getElementById('m-shipping').innerText = shipping === 0 ? "0원 (무료배송)" : "4,000원";
      document.getElementById('m-total').innerText = `${finalTotal.toLocaleString()} 원`;
    }

    async function submitOrder(productName, productId) {
      if (!currentUser) return;
      const qty = parseInt(document.getElementById('modal-qty').value);
      const isTax = document.getElementById('modal-tax').checked;
      const totalStr = document.getElementById('m-total').innerText.replace(/[^0-9]/g, '');

      const { error } = await supabaseClient.from('orders').insert([{
        user_id: currentUser.id,
        product_id: productId,
        product_name: productName,
        qty: qty,
        is_tax_invoice: isTax,
        total_price: parseInt(totalStr),
        status: 'pending'
      }]);

      if (error) {
        alert("주문 실패: " + error.message);
      } else {
        alert(`주문해주셔서 감사합니다. ${BANK_ACCOUNT_INFO}로 입금 부탁드립니다.`);
        hideModal('detail-modal');
        if (userProfile && userProfile.role === 'admin') fetchAdminOrders();
      }
    }

    // --- 관리자 전용 편집 / 삭제 / 발주 및 상품 등록 ---
    function openEditModal(productId) {
      const p = rawProductsData.find(item => item.id === productId);
      if (!p) return;

      document.getElementById('edit-p-id').value = p.id;
      document.getElementById('edit-p-name').value = p.name;
      document.getElementById('edit-p-category').value = p.category_id || '';
      document.getElementById('edit-p-deadline').value = p.deadline || '';
      document.getElementById('edit-p-price').value = p.wholesale_price;
      document.getElementById('edit-p-moq').value = p.moq;
      document.getElementById('edit-p-delivery').value = p.delivery_date || '';

      hideModal('detail-modal');
      showModal('edit-prod-modal');
    }

    async function saveProductEdit() {
      const id = document.getElementById('edit-p-id').value;
      const name = document.getElementById('edit-p-name').value;
      const categoryId = document.getElementById('edit-p-category').value;
      const deadline = document.getElementById('edit-p-deadline').value;
      const price = parseInt(document.getElementById('edit-p-price').value);
      const moq = parseInt(document.getElementById('edit-p-moq').value);
      const delivery = document.getElementById('edit-p-delivery').value;

      const { error } = await supabaseClient.from('products').update({
        name, category_id: categoryId ? parseInt(categoryId) : null,
        deadline, wholesale_price: price, moq, delivery_date: delivery
      }).eq('id', id);

      if (error) alert("수정 실패: " + error.message);
      else {
        alert("수정 완료되었습니다.");
        hideModal('edit-prod-modal');
        await fetchProducts();
      }
    }

    async function fetchAdminOrders() {
      const { data: orders } = await supabaseClient.from('orders').select('*').order('created_at', { ascending: false });
      const { data: profiles } = await supabaseClient.from('profiles').select('*');

      const container = document.getElementById('admin-orders-list');
      if (!orders || orders.length === 0) {
        container.innerHTML = "<p style='color:#64748b;'>현재까지 들어온 발주 내역이 없습니다.</p>";
        return;
      }

      const profileMap = {};
      (profiles || []).forEach(pf => { profileMap[pf.id] = pf; });

      const grouped = {};
      orders.forEach(ord => {
        const pName = ord.product_name || `상품 ID: ${ord.product_id}`;
        if (!grouped[pName]) grouped[pName] = [];
        grouped[pName].push(ord);
      });

      let html = '';
      for (const [productName, orderList] of Object.entries(grouped)) {
        const totalQty = orderList.reduce((sum, o) => sum + o.qty, 0);
        html += `
          <div style="margin-bottom:16px; background:#fff; padding:12px; border-radius:8px; border:1px solid var(--border-color);">
            <div style="font-weight:700; font-size:0.95rem; margin-bottom:6px; color:var(--primary);">
              📦 ${productName} (총 발주 수량: ${totalQty}개 / 총 ${orderList.length}건)
            </div>
            <table class="admin-order-table">
              <thead>
                <tr>
                  <th>상호명</th><th>예금주명</th><th>전화번호</th><th>주소</th><th>수량</th><th>총결제금액</th><th>발주일시</th>
                </tr>
              </thead>
              <tbody>
        `;

        orderList.forEach(o => {
          const user = profileMap[o.user_id] || {};
          const dateStr = new Date(o.created_at).toLocaleString('ko-KR');
          html += `
            <tr>
              <td><strong>${user.biz_name || '미기재'}</strong></td>
              <td>${user.depositor_name || '미기재'}</td>
              <td>${user.phone || '미기재'}</td>
              <td>${user.address || '미기재'}</td>
              <td><strong>${o.qty}개</strong></td>
              <td>${o.total_price ? o.total_price.toLocaleString() + '원' : '-'}</td>
              <td style="font-size:0.75rem; color:#64748b;">${dateStr}</td>
            </tr>
          `;
        });

        html += `</tbody></table></div>`;
      }

      container.innerHTML = html;
    }

    // 파일 업로드 (uploadFilesList 배열 일원화 등록)
    async function addProduct() {
      const name = document.getElementById('p-name').value;
      const categoryId = document.getElementById('p-category').value;
      const deadline = document.getElementById('p-deadline').value;
      const price = parseInt(document.getElementById('p-price').value);
      const moq = parseInt(document.getElementById('p-moq').value) || 1;
      const delivery = document.getElementById('p-delivery').value;

      if (!name || !deadline || isNaN(price)) return alert("상품명, 마감일, 도매가는 필수입니다.");

      const btn = document.getElementById('btn-add-prod');
      btn.disabled = true;
      btn.innerText = "⏳ 등록 진행 중...";

      let imageUrls = [];
      if (uploadFilesList.length > 0) {
        for (let i = 0; i < uploadFilesList.length; i++) {
          const file = uploadFilesList[i];
          const fileName = `${Date.now()}_${Math.random().toString(36).substring(2, 7)}.${file.name.split('.').pop() || 'png'}`;
          const filePath = `products/${fileName}`;
          const { error: uploadError } = await supabaseClient.storage.from('product-images').upload(filePath, file);
          if (!uploadError) {
            const { data: publicData } = supabaseClient.storage.from('product-images').getPublicUrl(filePath);
            if (publicData?.publicUrl) imageUrls.push(publicData.publicUrl);
          }
        }
      }

      const { error } = await supabaseClient.from('products').insert([{
        name, category_id: categoryId ? parseInt(categoryId) : null,
        deadline, wholesale_price: price, moq, delivery_date: delivery, images: imageUrls
      }]);

      btn.disabled = false;
      btn.innerText = "상품 등록하기";

      if (error) alert("등록 실패: " + error.message);
      else {
        alert("상품 등록 완료!");
        document.getElementById('p-name').value = "";
        document.getElementById('p-price').value = "";
        uploadFilesList = [];
        renderImagePreviews();
        await fetchProducts();
      }
    }

    async function deleteProduct(id) {
      if (!confirm("정말 이 상품을 삭제하시겠습니까?")) return;
      await supabaseClient.from('products').delete().eq('id', id);
      hideModal('detail-modal');
      await fetchProducts();
    }

    async function addMainCategory() {
      const name = document.getElementById('new-main-cat').value;
      if (name) {
        await supabaseClient.from('categories').insert([{ name, parent_id: null }]);
        document.getElementById('new-main-cat').value = "";
        await fetchCategories();
      }
    }

    async function addSubCategory() {
      const parentId = document.getElementById('select-parent-cat').value;
      const name = document.getElementById('new-sub-cat').value;
      if (parentId && name) {
        await supabaseClient.from('categories').insert([{ name, parent_id: parseInt(parentId) }]);
        document.getElementById('new-sub-cat').value = "";
        await fetchCategories();
      }
    }

    function updateUI() {
      const statusSpan = document.getElementById('user-status');
      const btnLogin = document.getElementById('btn-login-modal');
      const btnSignup = document.getElementById('btn-signup-modal');
      const btnLogout = document.getElementById('btn-logout');
      const adminCat = document.getElementById('admin-category-panel');
      const adminProd = document.getElementById('admin-product-panel');
      const adminOrders = document.getElementById('admin-orders-panel');

      if (currentUser) {
        const isAdmin = userProfile && userProfile.role === 'admin';
        statusSpan.innerText = `${isAdmin ? '🔥 관리자' : '🛒 구매회원'}: ${currentUser.email}`;
        btnLogin.classList.add('hidden');
        btnSignup.classList.add('hidden');
        btnLogout.classList.remove('hidden');

        if (isAdmin) {
          adminCat.classList.remove('hidden');
          adminProd.classList.remove('hidden');
          adminOrders.classList.remove('hidden');
        } else {
          adminCat.classList.add('hidden');
          adminProd.classList.add('hidden');
          adminOrders.classList.add('hidden');
        }
      } else {
        statusSpan.innerText = "비회원 (가격 열람 제한)";
        btnLogin.classList.remove('hidden');
        btnSignup.classList.remove('hidden');
        btnLogout.classList.add('hidden');
        adminCat.classList.add('hidden');
        adminProd.classList.add('hidden');
        adminOrders.classList.add('hidden');
      }
    }

    function showModal(id) { document.getElementById(id).classList.remove('hidden'); }
    function hideModal(id) { document.getElementById(id).classList.add('hidden'); }
  </script>
</body>
</html>
